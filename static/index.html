<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能旅行规划助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=99">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <button id="history-toggle" class="history-toggle" title="主菜单">
                    <svg class="menu-icon" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960"
                        width="24" fill="currentColor">
                        <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z" />
                    </svg>
                </button>
                <h1>智能旅行规划助手</h1>
            </div>
            <div class="status-indicator" id="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">就绪</span>
            </div>
        </header>

        <div class="content-wrapper">
            <aside class="history-sidebar collapsed" id="history-sidebar">
                <div class="sidebar-top-section">
                    <div class="sidebar-icons-row">
                        <button id="search-btn" class="sidebar-icon-btn" title="搜索">
                            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"
                                fill="currentColor">
                                <path
                                    d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
                            </svg>
                        </button>
                    </div>

                    <button id="new-chat-btn" class="new-chat-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24"
                            fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                        </svg>
                        <span class="new-chat-text">新对话</span>
                    </button>
                </div>

                <div class="history-header">
                    <h3>最近</h3>
                    <button id="clear-history" class="clear-history-btn" title="清空全部历史">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                        </svg>
                    </button>
                </div>
                <div class="history-list" id="history-list">
                    <div class="history-empty">暂无搜索历史</div>
                </div>
            </aside>

            <main class="chat-container" id="chat-container">
                <div class="welcome-message">
                    <div class="hero-text">
                        <span class="gradient-text">你好,旅行者</span>
                    </div>
                    <p class="subtitle">今天想让我带你去哪里探索世界?</p>
                </div>
                <!-- 消息将插入到这里 -->
            </main>
        </div>
    </div>

    <div class="input-wrapper">
        <form id="chat-form">
            <input type="file" id="file-input" style="display: none;" multiple>
            <button type="button" class="attach-btn" title="打开菜单" id="attach-menu-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>

            <div class="attachment-menu" id="attachment-menu">
                <label for="file-input" class="menu-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                        </path>
                    </svg>
                    <span>上传文件</span>
                </label>
            </div>
            <input type="text" id="user-input" placeholder="向智能旅行助手提问…" autocomplete="off">
            <button type="submit" id="send-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </form>
        <div class="attribution">
            天气数据来自 <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> •
            航班数据来自 <a href="https://developers.amadeus.com/" target="_blank" rel="noopener">Amadeus</a>
        </div>
    </div>
    </div>
    <!-- 确认弹窗 -->
    <div id="confirmation-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 id="modal-title">确认操作</h3>
            <p id="modal-message">确定吗?</p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn-secondary">取消</button>
                <button id="modal-confirm" class="btn-danger">确认</button>
            </div>
        </div>
    </div>

    <!-- 输入弹窗(用于重命名等) -->
    <div id="input-modal" class="modal-overlay hidden">
        <div class="modal-content input-modal-content">
            <h3 id="input-modal-title">重命名</h3>
            <input type="text" id="input-modal-field" class="input-modal-field" placeholder="输入新标题">
            <div class="modal-actions">
                <button id="input-modal-cancel" class="btn-secondary">取消</button>
                <button id="input-modal-confirm" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div id="toast-notification" class="toast hidden">
        <svg class="toast-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span id="toast-message">已复制到剪贴板!</span>
    </div>

    <!-- 搜索弹窗 -->
    <div id="search-modal" class="modal-overlay hidden">
        <div class="search-modal-content">
            <h2 class="search-title">搜索</h2>
            <div class="search-input-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960"
                    width="24" fill="currentColor">
                    <path
                        d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
                </svg>
                <input type="text" id="modal-search-input" placeholder="搜索对话">
            </div>

            <div class="search-results-section">
                <h4 class="section-title">最近</h4>
                <div id="search-results-list" class="search-results-list">
                    <!-- 结果由 JS 填充 -->
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js?v=99"></script>
</body>

</html>
